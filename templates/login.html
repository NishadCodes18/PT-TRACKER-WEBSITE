<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NITRRO ZONE 360</title>
    <meta name="description" content="Trainer login portal for NITRRO ZONE 360 Balewadi gym management system.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">⚡</div>
                <h1>NITRRO ZONE 360</h1>
                <div class="gym-sub">Balewadi · Trainer Portal</div>
                <p>Sign in to manage your clients</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px; padding:14px;">⚡ Sign In</button>
            </form>
            <div class="auth-footer">
                <p>New trainer? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
