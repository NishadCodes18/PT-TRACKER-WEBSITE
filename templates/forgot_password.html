<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Personal Training Gym Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🔐</div>
                <h1>Password Reset</h1>
                <div class="gym-sub">Secure OTP recovery</div>
                <p>Enter your username or email to receive a one-time code.</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="identifier">Username or Email</label>
                    <input type="text" id="identifier" name="identifier" required autocomplete="username" placeholder="Enter your username or email">
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px; padding:14px;">Send OTP</button>
            </form>
            <div class="auth-links">
                <a href="{{ url_for('auth.login') }}">Back to sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
