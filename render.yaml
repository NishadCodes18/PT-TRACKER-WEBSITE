# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gym-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: RENDER
        value: "true"
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REMEMBER_COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gym-tracker-db
          property: connectionString
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GYM_NAME
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: cron
    name: gym-tracker-renewal-cron
    runtime: python
    schedule: "0 4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cron_send_renewals.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: APP_URL
        fromService:
          type: web
          name: gym-tracker
          property: host
      - key: CRON_SECRET
        fromService:
          type: web
          name: gym-tracker
          envVarKey: CRON_SECRET

databases:
  - name: gym-tracker-db
    plan: free
    databaseName: gym_tracker
    user: gym_tracker
